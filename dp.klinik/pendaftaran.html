<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <section class="py-16">
      <div class="container mx-auto px-4 max-w-2xl">
        <h2 class="text-3xl font-bold text-center text-purple-800 mb-8">Form Pendaftaran Online</h2>
        <form class="bg-white p-8 rounded-lg shadow-md">
          <div class="mb-4">
            <label class="block text-gray-700 mb-2">Nama Lengkap</label>
            <input type="text" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-purple-500" />
          </div>
          <!-- Tambahkan field lainnya -->
          <button class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">Daftar Sekarang</button>
        </form>
      </div>
    </section>
  </body>
</html>
